<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>금시세 · 날짜별 추이</title>
  <link rel="stylesheet" href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="inner">
      <h1>금시세 대시보드</h1>
      <p class="sub">3.75g(1돈) 기준 · 한국금거래소 공개 데이터</p>
    </div>
  </header>

  <main class="wrap">
    <section class="panel controls">
      <label>
        기간(일)
        <select id="days">
          <option value="90">최근 90일</option>
          <option value="180">최근 180일</option>
          <option value="365" selected>최근 1년</option>
          <option value="730">최근 2년</option>
        </select>
      </label>
      <button type="button" id="reload" class="btn">새로고침</button>
      <span id="meta" class="meta"></span>
    </section>

    <section class="panel chart-panel">
      <h2>날짜별 시세 추이</h2>
      <p class="hint">일자별로 해당 일의 <strong>마지막 고시</strong> 시세를 연결한 선 그래프입니다.</p>
      <div class="chart-wrap">
        <canvas id="priceChart" aria-label="금시세 추이 차트"></canvas>
      </div>
      <div class="legend-toggles">
        <label><input type="checkbox" data-series="0" checked /> 살 때 순금</label>
        <label><input type="checkbox" data-series="1" checked /> 팔 때 순금</label>
        <label><input type="checkbox" data-series="2" checked /> 팔 때 18K</label>
        <label><input type="checkbox" data-series="3" checked /> 팔 때 14K</label>
      </div>
    </section>

    <section class="panel table-panel">
      <h2>고시 내역 (최신순)</h2>
      <div id="example-table"></div>
    </section>

    <footer class="disclaimer">
      <p>출처: 한국금거래소 공개 금시세 API. 참고용이며 실제 거래가와 다를 수 있습니다.</p>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
  <script src="/assets/app.js"></script>
</body>
</html>
